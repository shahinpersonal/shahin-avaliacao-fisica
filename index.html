<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Shahin Personal Trainer - Avaliação Física</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 600px;
      margin: auto;
      background: white;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
      margin-bottom: 5px;
    }

    .sub {
      text-align: center;
      color: gray;
      font-size: 14px;
      margin-bottom: 20px;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin-bottom: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: black;
      color: white;
      font-weight: bold;
      cursor: pointer;
      font-size: 15px;
    }

    #resultado {
      margin-top: 15px;
      font-weight: bold;
    }

    .footer {
      text-align: center;
      font-size: 12px;
      color: gray;
      margin-top: 20px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Shahin Personal Trainer</h1>
    <div class="sub">
      Avaliação Física Profissional<br>
      CREF 033699-G/SP | Tel: 11 99546-2603
    </div>

    <input placeholder="Nome do aluno">
    <input type="number" placeholder="Idade">
    <input placeholder="Telefone">
    <input id="peso" type="number" placeholder="Peso (kg)">
    <input id="altura" type="number" placeholder="Altura (cm)">

    <button onclick="calcularIMC()">Calcular IMC</button>

    <div id="resultado"></div>

    <textarea placeholder="Observações e recomendações"></textarea>

    <div class="footer">
      © 2026 Shahin Personal Trainer
    </div>
  </div>

  <script>
    function calcularIMC() {
      var peso = document.getElementById("peso").value;
      var altura = document.getElementById("altura").value;

      if (peso && altura) {
        var alturaM = altura / 100;
        var imc = (peso / (alturaM * alturaM)).toFixed(2);
        document.getElementById("resultado").innerHTML = "IMC: " + imc;
      } else {
        document.getElementById("resultado").innerHTML = "Preencha peso e altura.";
      }
    }
  </script>
</body>
</html>
